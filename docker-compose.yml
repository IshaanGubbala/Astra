services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OBSIDIAN_VAULT=/data/astra_docs
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - astra_docs_data:/data/astra_docs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - BACKEND_URL=http://backend:8000
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_YWxsb3dlZC1zdGluZ3JheS0zNy5jbGVyay5hY2NvdW50cy5kZXYk
        - NEXT_PUBLIC_API_URL=http://167.235.151.204:8000
        - NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:8000
      - CLERK_SECRET_KEY=sk_test_MrNGeruaNmCxNl7Be9ysFQzuIACaInvmffIR7Am799
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  redis_data:
  astra_docs_data:
